<script type="text/javascript">

var turvan_lev = 93;
var turvan_kork = 94;

// Turvaneliön koordinaatit
var turvan_vasen_reuna = 0;   
var turvan_ylareuna = 0;
var morko_alussax = 0;
var morko_alussay = 0;
var x_morko = 0;

var vauhti = 1;     //  Mörön palautumisvauhti turvan taakse.

var uusi_paikkax = "0px";			 //Mörön uusi paikka x
var uusi_paikkay = "0px";			 //Mörön uusi paikka y
var kerroinx = 1;	 				// Säätelee mörön vauhtia leveyssuunnassa.
var kerroiny = 1;					 // Säätelee vauhtia korkeussuunnassa.
var vauhti_indeksi = 1;				 // Yleinen nopeudensäätö eli vaikeusaste.
var suuntax = 1;		// Tämän avulla voidaan suunta vaihtaa (1-oik, -1-vas)
var suuntay = 1;		// Tämän avulla voidaan suunta vaihtaa (1-alas, -1-ylös)
var ajastin;
var x_hiiri = 500;
var y_hiiri = 500;
var peli_loppu = true;

var LOPPUX = 0;
var LOPPUY = 0;

// suun korkeus:
var suun_kork = 45;

function hae_asetukset()
{
 	// Haetaan vaikeustaso:
	//vauhti_indeksi = document.vaikeustaso.value; EI TOIMI!
	vauhti_indeksi = document.getElementById('vaikeustaso').value; 
	peli_loppu = false;
	aloita_uusi_peli();
}

// Kutsutaan sivua ladatessa:
function aloita_peli()
{
  turvan_vasen_reuna = Math.floor(hae_ikkunan_leveys()/2 - turvan_lev/2);   
  turvan_ylareuna = Math.floor(hae_ikkunan_korkeus()/2 - turvan_kork/2);
  morko_alussax = turvan_vasen_reuna;
  morko_alussay = turvan_ylareuna - 40;
  x_morko = morko_alussax;
  y_morko = morko_alussay - 5;
  
  document.getElementById('turvapaikka').style.left=turvan_vasen_reuna; 
  document.getElementById('turvapaikka').style.top=turvan_ylareuna;
	liikuta_morko();
}
// Hakee mörön suunnat ja kertoimet:
function hae_suunta(event)
{
    if(peli_loppu == false)
    {
        // Korjataan niin, että tulee mörön suuhun tämä tähtäyspiste:
        x_hiiri = event.clientX - 40;
        y_hiiri = event.clientY - 40;
	
        // Hampaat näkyville:
        document.getElementById('morko').src = "Morko.gif";
	
        // hiiren ja otsikon kesk. sijainnille on neljä vaihtoehtoa. Ensin tilanne, 
        // jossa morko on hiirestä katsoen vasemmalla ja ylhäällä:
        if(x_morko < x_hiiri && y_morko < y_hiiri)
        {
            suuntax = 1;
            suuntay = 1;	
        }
	
        // morko on hiirestä katsoen vasemmalla ja alhaalla:
        else if(x_morko < x_hiiri && y_morko >= y_hiiri)
        {
            suuntax = 1;
            suuntay = -1;	
        }
        // morko on hiirestä katsoen oikealla ja alhaalla:
        else if(x_morko >= x_hiiri && y_morko >= y_hiiri)
        {
            suuntax = -1;
            suuntay = -1;	
        }
        // morko on hiirestä katsoen oikealla ja ylhäällä:
        else if(x_morko >= x_hiiri && y_morko < y_hiiri)
        {
            suuntax = -1;
            suuntay = 1;	
        }
        // Lasketaan kertoimet. Varotaan nollalla jakamista ja kovin
				// pieni arvo aiheuttaa yllätyskiihdytyksiä..
        jakajax = (y_morko - y_hiiri);
        if(Math.abs(y_morko - y_hiiri) < 8)
        {
            jakajax = 8;
        }
        
        jakajay = (x_morko - x_hiiri);
        if(Math.abs(x_morko - x_hiiri) < 8)
        {
            jakajay = 8;
        }
        kerroinx = Math.abs(((x_morko - x_hiiri))/jakajax);
        kerroiny = Math.abs(((y_morko - y_hiiri))/jakajay);
	
        liikuta_morko();
    }
}

function liikuta_morko()
{   
    if(peli_loppu == false)
	{
        // Tarkistetaan, onko mörkö syönyt hiiren:
        if(syoty())
        {
            lopeta_peli_synkasti();
        }
        else if(olio_turvassa(x_hiiri+40, y_hiiri+40))
        {
            nayta_onniloppu();
        }
        else
        {
				 		xlisays = suuntax*kerroinx*vauhti_indeksi*vauhti_indeksi/5;
						if(xlisays < 0 && xlisays > -3)
						{
						  xlisays = -3;
						}
						else if(xlisays > 0 && xlisays < 3)
						{
						  xlisays = 3;
						}
						else
						{
						  xlisays = Math.floor(xlisays);
						}
						
						
						ylisays = suuntay*kerroiny*vauhti_indeksi*vauhti_indeksi/5; 
						if(ylisays < 0 && ylisays > -3)
						{
						  ylisays = -3;
						}
						else if(ylisays > 0 && ylisays < 3)
						{
						  ylisays = 3;
						}
						else
						{
						  ylisays = Math.floor(ylisays);
						}
						
            x_morko = x_morko+xlisays;
            y_morko = y_morko+ylisays;
            
            // Alla lienee tarpeeton, pelkkä luku tulkitaan samoin kai.
            uusi_paikkax = x_morko+"px";
            uusi_paikkay = y_morko+"px";
            
            document.getElementById('morko').style.left=uusi_paikkax; 
            document.getElementById('morko').style.top=uusi_paikkay;
            //ajastin = setTimeout("liikuta_morko()",100);
        }
	}
}

}

    document.getElementById('morko').style.top = morko_alussay; 
    document.getElementById('morko').style.left = morko_alussax;

// Tämä palauttaa true, jos hiiri on mörön alueella eli syöty ja 
// false muuten.
function syoty()
{
    var osui = false;
    var suun_vas_laita = x_morko+5;
    var suun_oik_laita = x_morko+75;
    var suun_ylalaita = y_morko+15;
    var suun_alalaita = y_morko+65;
 
    // +40 on korjaus, joka alussa tehtiin toiseen suuntaan.
    if ((x_hiiri+40) < suun_oik_laita && 
        (x_hiiri+40) > suun_vas_laita &&
        (y_hiiri+40) < suun_alalaita &&
        (y_hiiri+40) > suun_ylalaita)
    {
        osui = true;
	   peli_loppu = true;
	   palauta_morko();
    }
    return osui;
}

// Leveyden ja korkeuden hakemiseen malli saatu osoitteesta 
// http://www.howtocreate.co.uk/tutorials/javascript/browserwindow
function hae_ikkunan_korkeus() 
{
  var kork = 0;
  if(typeof(window.innerHeight) == 'number') 
  {
    //Non-IE
    kork = window.innerHeight;
  } 
  else if( document.documentElement && document.documentElement.clientHeight ) 
  {
    //IE 6+ in 'standards compliant mode'
    kork = document.documentElement.clientHeight;
  } 
  else if( document.body && document.body.clientHeight ) 
  {
    //IE 4 compatible
    kork = document.body.clientHeight;
  }
  return kork;
}

// Leveyden ja korkeuden hakemiseen malli saatu osoitteesta 
// http://www.howtocreate.co.uk/tutorials/javascript/browserwindow
function hae_ikkunan_leveys() 
{
  var lev = 0;
  if( typeof( window.innerWidth ) == 'number' ) 
  {
    //Non-IE
    lev = window.innerWidth;
  } 
  else if( document.documentElement && document.documentElement.clientWidth ) 
  {
    //IE 6+ in 'standards compliant mode'
    lev = document.documentElement.clientWidth;
  } 
  else if( document.body && document.body.clientWidth ) 
  {
    //IE 4 compatible
    lev = document.body.clientWidth;
  }
  return lev;
}
